# Build the application image first:
#   podman build -t localhost/gsrs-mcp-server:latest .
#
# Edit the placeholder secrets below before starting the stack:
#   POSTGRES_PASSWORD
#   MCP_PASSWORD
#   EMBEDDING_API_KEY
#   LLM_API_KEY
#
# Then start the stack:
#   podman kube play podman-kube-play.yaml
#
# Stop and remove it later with:
#   podman kube down podman-kube-play.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gsrs-postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gsrs-chroma-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Pod
metadata:
  name: gsrs-mcp
  labels:
    app: gsrs-mcp-server
spec:
  restartPolicy: Always
  containers:
    - name: postgres
      image: docker.io/pgvector/pgvector:pg18
      env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_DB
          value: gsrs_mcp
        - name: POSTGRES_PASSWORD
          value: change-me
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql
    - name: mcp-server
      image: localhost/gsrs-mcp-server:latest
      imagePullPolicy: Never
      env:
        - name: DATABASE_URL
          value: postgresql://postgres:change-me@127.0.0.1:5432/gsrs_mcp
        - name: MCP_TRANSPORT
          value: streamable-http
        - name: MCP_API
          value: 0.0.0.0
        - name: MCP_PORT
          value: "8000"
        - name: MCP_USERNAME
          value: admin
        - name: MCP_PASSWORD
          value: change-me
        - name: EMBEDDING_API_KEY
          value: sk-your-embedding-key
        - name: EMBEDDING_URL
          value: https://api.openai.com/v1/embeddings
        - name: EMBEDDING_MODEL
          value: text-embedding-3-small
        - name: EMBEDDING_DIMENSION
          value: "1536"
        - name: DEFAULT_TOP_K
          value: "5"
        - name: GSRS_API_URL
          value: https://gsrs.ncats.nih.gov/api/v1
        - name: GSRS_API_TIMEOUT
          value: "30"
        - name: GSRS_API_VERIFY_SSL
          value: "true"
        - name: GSRS_API_PUBLIC_ONLY
          value: "false"
        - name: LLM_API_KEY
          value: ""
        - name: LLM_URL
          value: https://api.openai.com/v1/chat/completions
        - name: LLM_MODEL
          value: gpt-4o-mini
        - name: LLM_VERIFY_SSL
          value: "true"
        - name: LLM_TIMEOUT
          value: "30"
        - name: DEBUG_MODE
          value: "false"
        - name: STARTUP_VALIDATE_EXTERNAL
          value: "false"
      ports:
        - containerPort: 8000
          hostPort: 8000
      volumeMounts:
        - name: chroma-data
          mountPath: /app/chroma_data
  volumes:
    - name: postgres-data
      persistentVolumeClaim:
        claimName: gsrs-postgres-data
    - name: chroma-data
      persistentVolumeClaim:
        claimName: gsrs-chroma-data
